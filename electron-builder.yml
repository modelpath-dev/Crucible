appId: com.crucible.ide
productName: Crucible
directories:
  buildResources: resources
  output: release
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/rg
    to: rg
    filter:
      - "**/*"
linux:
  target:
    - AppImage
    - deb
  category: Development
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
win:
  target:
    - nsis
